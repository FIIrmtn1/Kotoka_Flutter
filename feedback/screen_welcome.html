<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kotoka – Welcome Screen</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #1e293b;
      font-family: "IBM Plex Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    /* Mobile frame shell */
    .device {
      width: 390px;
      height: 844px;
      background: #DBEAFE;
      border-radius: 52px;
      box-shadow:
        0 0 0 10px #0f172a,
        0 0 0 12px #334155,
        0 40px 80px rgba(0,0,0,.6);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }

    /* Notch */
    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 126px;
      height: 34px;
      background: #0f172a;
      border-radius: 0 0 20px 20px;
      z-index: 10;
    }

    /* Status bar */
    .status-bar {
      height: 50px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      padding: 0 28px 8px;
      font-size: 12px;
      font-weight: 600;
      color: #1E3A8A;
      flex-shrink: 0;
    }
    .status-time { font-size: 14px; font-weight: 700; }
    .status-icons { display: flex; gap: 6px; align-items: center; }
    .status-icons span { font-size: 14px; }

    /* Screen content */
    .screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 32px 40px;
      position: relative;
    }

    /* Decorative background blobs */
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(48px);
      opacity: 0.45;
      pointer-events: none;
    }
    .blob-1 { width: 260px; height: 260px; background: #93C5FD; top: -40px; left: -60px; }
    .blob-2 { width: 200px; height: 200px; background: #BFDBFE; bottom: 120px; right: -50px; }

    /* Mascot */
    .mascot-wrap {
      margin-top: 80px;
      margin-bottom: 32px;
      position: relative;
      z-index: 1;
    }
    .mascot {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: linear-gradient(145deg, #3B82F6, #1E3A8A);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 12px 40px rgba(30,58,138,.35),
        0 0 0 6px rgba(255,255,255,.55),
        0 0 0 10px rgba(147,197,253,.30);
      animation: bob 2s ease-in-out infinite;
    }
    @keyframes bob {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }
    .mascot-eyes {
      display: flex;
      gap: 20px;
      margin-bottom: 8px;
    }
    .eye {
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .pupil {
      width: 9px;
      height: 9px;
      background: #0C1A3A;
      border-radius: 50%;
    }
    .mascot-smile {
      font-size: 22px;
      line-height: 1;
      filter: brightness(0) invert(1);
    }

    /* Koko label */
    .koko-label {
      margin-top: 10px;
      font-size: 12px;
      font-weight: 700;
      color: #3B82F6;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* Text block */
    .text-block {
      text-align: center;
      position: relative;
      z-index: 1;
      margin-bottom: auto;
    }
    .app-name {
      font-size: 28px;
      font-weight: 800;
      color: #1E3A8A;
      letter-spacing: -0.5px;
      margin-bottom: 10px;
    }
    .tagline {
      font-size: 16px;
      color: #374151;
      line-height: 1.55;
      max-width: 260px;
      margin: 0 auto;
    }

    /* Language pills */
    .lang-flags {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      justify-content: center;
      position: relative;
      z-index: 1;
    }
    .flag-pill {
      height: 30px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.70);
      backdrop-filter: blur(8px);
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 5px;
      color: #374151;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid rgba(255,255,255,.8);
      box-shadow: 0 1px 4px rgba(30,58,138,.08);
    }

    /* CTA area */
    .cta-area {
      width: 100%;
      position: relative;
      z-index: 1;
    }
    .btn-start {
      width: 100%;
      height: 56px;
      background: #1E3A8A;
      color: #fff;
      border: none;
      border-radius: 999px;
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(30,58,138,.40);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      letter-spacing: 0.2px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-start:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(30,58,138,.45); }
    .btn-start:active { transform: translateY(0); }

    .terms {
      text-align: center;
      font-size: 12px;
      color: #6B7280;
      margin-top: 14px;
      line-height: 1.5;
    }
    .terms a { color: #3B82F6; text-decoration: none; }
  </style>
</head>
<body>

<div class="device">
  <div class="notch"></div>

  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <span>●●●</span>
      <span>WiFi</span>
      <span>🔋</span>
    </div>
  </div>

  <!-- Screen -->
  <div class="screen">

    <!-- Background blobs -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Mascot Koko -->
    <div class="mascot-wrap">
      <div class="mascot">
        <div class="mascot-eyes">
          <div class="eye"><div class="pupil"></div></div>
          <div class="eye"><div class="pupil"></div></div>
        </div>
        <div class="mascot-smile">😊</div>
      </div>
      <div class="koko-label">Koko</div>
    </div>

    <!-- App name + tagline -->
    <div class="text-block">
      <div class="app-name">Kotoka</div>
      <p class="tagline">Turn your life into your language curriculum</p>
    </div>

    <!-- Spacer -->
    <div style="height: 32px;"></div>

    <!-- Supported languages -->
    <div class="lang-flags">
      <div class="flag-pill">🇹🇭 Thai</div>
      <div class="flag-pill">🇬🇧 English</div>
      <div class="flag-pill">🇨🇳 Chinese</div>
      <div class="flag-pill">🇪🇸 Spanish</div>
      <div class="flag-pill">🇻🇳 Vietnamese</div>
      <div class="flag-pill">🇱🇦 Lao</div>
    </div>

    <!-- CTA -->
    <div class="cta-area">
      <button class="btn-start">Get Started →</button>
      <p class="terms">By continuing you agree to our <a href="#">Terms</a> &amp; <a href="#">Privacy</a></p>
    </div>

  </div><!-- /screen -->
</div><!-- /device -->

</body>
</html>
