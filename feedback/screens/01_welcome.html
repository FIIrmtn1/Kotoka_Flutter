<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kotoka – Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #E5E7EB;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
    }

    /* Dark mode toggle button */
    .dark-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      background: #1E293B;
      color: #F9FAFB;
      border: 1px solid #374151;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      z-index: 1000;
      font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
      transition: background 0.2s, color 0.2s;
    }
    body:not(.dark) .dark-toggle {
      background: #F3F4F6;
      color: #111827;
      border-color: #D1D5DB;
    }

    /* Dark mode page */
    body.dark {
      background: #0F172A;
    }

    /* Phone frame */
    .phone {
      width: 390px;
      min-height: 844px;
      background: #DBEAFE;
      border-radius: 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body.dark .phone {
      background: #1E293B;
    }

    /* Status bar */
    .status-bar {
      height: 24px;
      flex-shrink: 0;
    }

    /* Main content */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 32px;
      text-align: center;
    }

    /* Koko mascot */
    .koko-mascot {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3B82F6, #1E3A8A);
      position: relative;
      animation: kokoIdle 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes kokoIdle {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }

    /* Eyes */
    .koko-mascot::before,
    .koko-mascot::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      background: #FFFFFF;
      border-radius: 50%;
      top: 52px;
    }
    .koko-mascot::before { left: 44px; }
    .koko-mascot::after  { right: 44px; }

    /* Smile */
    .koko-smile {
      position: absolute;
      width: 40px;
      height: 20px;
      border: 2px solid #FFFFFF;
      border-top: none;
      border-radius: 0 0 20px 20px;
      bottom: 46px;
      left: 50%;
      transform: translateX(-50%);
    }

    /* Typography */
    .brand-name {
      font-weight: 700;
      font-size: 32px;
      line-height: 1.3;
      color: #0C1A3A;
      letter-spacing: -0.5px;
      margin-top: 24px;
    }

    body.dark .brand-name {
      color: #F9FAFB;
    }

    .tagline {
      font-weight: 400;
      font-size: 16px;
      line-height: 1.6;
      color: #374151;
      max-width: 280px;
      margin-top: 8px;
    }

    body.dark .tagline {
      color: #D1D5DB;
    }

    /* Flags row */
    .flags {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 24px;
      line-height: 1;
    }

    /* Bottom area */
    .bottom {
      padding: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .btn-get-started {
      width: 100%;
      height: 56px;
      background: #1E3A8A;
      color: #FFFFFF;
      font-family: 'IBM Plex Sans', system-ui, -apple-system, sans-serif;
      font-weight: 600;
      font-size: 14px;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-get-started:hover { opacity: 0.9; }

    .legal {
      font-size: 12px;
      line-height: 1.5;
      color: #6B7280;
      text-align: center;
      margin-top: 16px;
    }

    body.dark .legal {
      color: #9CA3AF;
    }
  </style>
</head>
<body class="dark">
  <button class="dark-toggle" onclick="toggleDark(this)">☀️ Light</button>

  <div class="phone">
    <div class="status-bar"></div>

    <div class="content">
      <div class="koko-mascot">
        <div class="koko-smile"></div>
      </div>

      <div class="brand-name">Kotoka</div>
      <div class="tagline">Turn your life into your language curriculum</div>

      <div class="flags">
        <span>🇹🇭</span>
        <span>🇬🇧</span>
        <span>🇨🇳</span>
        <span>🇪🇸</span>
        <span>🇻🇳</span>
        <span>🇱🇦</span>
      </div>
    </div>

    <div class="bottom">
      <button class="btn-get-started">Get Started</button>
      <p class="legal">By continuing you agree to our Terms &amp; Privacy Policy</p>
    </div>
  </div>

  <script>
    function toggleDark(btn) {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
    }
  </script>
</body>
</html>
